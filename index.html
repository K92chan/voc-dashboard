<!DOCTYPE html>
<html>
  <head>
    <title>VOC 대시보드</title>
    <style>
      body {
        background-color: #f0f2f5;
        font-family: 맑은고딕, sans-serif;
        padding: 20px;
      }

      h1 {
        color: #333;
      }

      .카드묶음 {
        display: flex;
        gap: 16px;
        margin-top: 20px;
      }

      .카드 {
        background-color: white;
        border-radius: 12px;
        padding: 24px;
        width: 200px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        text-align: center;
      }

      .카드 .숫자 {
        font-size: 40px;
        font-weight: bold;
        color: #1a73e8;
      }

      .카드 .설명 {
        font-size: 14px;
        color: #888;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h1>📊 VOC 대시보드</h1>

    <div class="카드묶음">
      <div class="카드">
        <div class="숫자">2,385</div>
        <div class="설명">총 VOC 건수</div>
      </div>
      <div class="카드">
        <div class="숫자">94.6</div>
        <div class="설명">평균 점수</div>
      </div>
      <div class="카드">
        <div class="숫자">95.2%</div>
        <div class="설명">칭찬 비율</div>
      </div>
      <div class="카드">
        <div class="숫자">1.8%</div>
        <div class="설명">불만 비율</div>
      </div>
    </div>
<h2 style="margin-top: 40px; color: #333;">📋 센터별 현황</h2>

    <table style="
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-top: 12px;
    ">
      <tr style="background-color: #1a73e8; color: white;">
        <th style="padding: 14px;">물류센터</th>
        <th style="padding: 14px;">평균점수</th>
        <th style="padding: 14px;">총 건수</th>
        <th style="padding: 14px;">칭찬률</th>
        <th style="padding: 14px;">불만률</th>
      </tr>
      <tr style="text-align: center; border-bottom: 1px solid #eee;">
        <td style="padding: 12px;">청원배송</td>
        <td style="padding: 12px; font-weight: bold; color: #1a73e8;">95.6</td>
        <td style="padding: 12px;">415</td>
        <td style="padding: 12px; color: green;">95.9%</td>
        <td style="padding: 12px; color: red;">0.7%</td>
      </tr>
      <tr style="text-align: center; border-bottom: 1px solid #eee; background: #f9f9f9;">
        <td style="padding: 12px;">전주물류센타</td>
        <td style="padding: 12px; font-weight: bold; color: #1a73e8;">95.0</td>
        <td style="padding: 12px;">435</td>
        <td style="padding: 12px; color: green;">96.7%</td>
        <td style="padding: 12px; color: red;">1.0%</td>
      </tr>
      <tr style="text-align: center; border-bottom: 1px solid #eee;">
        <td style="padding: 12px;">장유물류센타</td>
        <td style="padding: 12px; font-weight: bold; color: #1a73e8;">94.1</td>
        <td style="padding: 12px;">515</td>
        <td style="padding: 12px; color: green;">94.9%</td>
        <td style="padding: 12px; color: red;">2.2%</td>
      </tr>
      <tr style="text-align: center; border-bottom: 1px solid #eee; background: #f9f9f9;">
        <td style="padding: 12px;">경기물류센타</td>
        <td style="padding: 12px; font-weight: bold; color: #e53935;">92.9</td>
        <td style="padding: 12px;">366</td>
        <td style="padding: 12px; color: green;">93.4%</td>
        <td style="padding: 12px; color: red;">2.7%</td>
      </tr>
    </table>
<h2 style="margin-top: 40px; color: #333;">📈 월별 평균점수 추이</h2>

    <div style="
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-top: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    ">
      <canvas id="차트"></canvas>
    </div>

    <!-- Chart.js 불러오기 (이게 소스를 가져오는 부분이에요) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
      const ctx = document.getElementById('차트');

      new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['1월', '2월', '3월'],
          datasets: [
            {
              label: '경기물류센타',
              data: [92.7, 92.3, 93.9],
              borderColor: '#e53935',
              tension: 0.3
            },
            {
              label: '청원배송',
              data: [95.5, 95.0, 96.7],
              borderColor: '#1a73e8',
              tension: 0.3
            },
            {
              label: '장유물류센타',
              data: [94.5, 94.9, 91.8],
              borderColor: '#ff9800',
              tension: 0.3
            },
            {
              label: '전주물류센타',
              data: [95.7, 93.7, 95.9],
              borderColor: '#4caf50',
              tension: 0.3
            }
          ]
        },
        options: {
          plugins: {
            title: {
              display: true,
              text: '센터별 월별 평균점수 (100점 만점)'
            }
          },
          scales: {
            y: {
              min: 88,
              max: 100
            }
          }
        }
      });
    </script>
  </body>
</html>
