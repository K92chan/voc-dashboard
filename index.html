<!DOCTYPE html>
<html>
<head>
  <title>기사 운행기록 대시보드</title>
  <meta charset="utf-8">
  <style>
    body {
      background-color: #f0f2f5;
      font-family: 맑은고딕, sans-serif;
      padding: 20px;
      margin: 0;
    }
    h1 { color: #333; margin-bottom: 4px; }
    .부제 { color: #888; font-size: 14px; margin-bottom: 20px; }

    /* 기사 선택 버튼 */
    .기사버튼묶음 {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .기사버튼 {
      padding: 8px 16px;
      border: 2px solid #1a73e8;
      border-radius: 20px;
      background: white;
      color: #1a73e8;
      cursor: pointer;
      font-size: 14px;
    }
    .기사버튼.선택됨 {
      background: #1a73e8;
      color: white;
    }

    /* 카드 */
    .카드묶음 {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .카드 {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      min-width: 160px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    .카드 .숫자 {
      font-size: 32px;
      font-weight: bold;
      color: #1a73e8;
    }
    .카드 .설명 {
      font-size: 13px;
      color: #888;
      margin-top: 6px;
    }

    /* 지도 */
    #지도 {
      width: 100%;
      height: 450px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    /* 표 */
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    th {
      background-color: #1a73e8;
      color: white;
      padding: 12px;
      font-size: 14px;
    }
    td {
      padding: 10px 12px;
      text-align: center;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
    tr:nth-child(even) td { background-color: #f9f9f9; }

    .순서뱃지 {
      display: inline-block;
      background: #1a73e8;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      line-height: 24px;
      font-size: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>🚗 기사 운행기록 대시보드</h1>
<p class="부제">기사를 선택하면 해당 기사의 운행경로와 기록을 볼 수 있어요</p>

<div class="기사버튼묶음" id="기사버튼묶음"></div>

<div class="카드묶음" id="카드묶음">
  <div class="카드"><div class="숫자" id="카드방문">-</div><div class="설명">총 방문건수</div></div>
  <div class="카드"><div class="숫자" id="카드출발">-</div><div class="설명">출발시간</div></div>
  <div class="카드"><div class="숫자" id="카드마지막">-</div><div class="설명">마지막 도착</div></div>
  <div class="카드"><div class="숫자" id="카드날짜">-</div><div class="설명">운행날짜</div></div>
</div>

<div id="지도"></div>

<table>
  <thead>
    <tr>
      <th>순서</th>
      <th>주소</th>
      <th>출발시간</th>
      <th>도착시간</th>
    </tr>
  </thead>
  <tbody id="표내용"></tbody>
</table>

<!-- 네이버 지도 API -->
<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=nti3kkmh2c"></script>

<script>
  const 시트주소 = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTs6k1Ky8Hdnrl2U5A242Vg6ZqBaQSrLGkDr2xf_yMuMflYc-dD_2-v-2wRmIsip32W087DXCx4ZRzu/pub?gid=0&single=true&output=csv';

  let 전체데이터 = [];
  let 지도객체 = null;
  let 현재마커들 = [];
  let 현재폴리라인 = null;

  // 데이터 불러오기
  fetch(시트주소)
    .then(r => r.text())
    .then(csv => {
      const 줄들 = csv.trim().split('\n');
      for (let i = 1; i < 줄들.length; i++) {
        const v = 줄들[i].split(',');
        if (v.length < 6) continue;
        전체데이터.push({
          기사명: v[0].trim(),
          날짜: v[1].trim(),
          방문순서: parseInt(v[2]),
          주소: v[3].trim(),
          위도: parseFloat(v[4]),
          경도: parseFloat(v[5]),
          출발시간: v[6] ? v[6].trim() : '-',
          도착시간: v[7] ? v[7].trim() : '-'
        });
      }

      // 기사 목록 추출
      const 기사목록 = [...new Set(전체데이터.map(d => d.기사명))];

      // 기사 버튼 생성
      const 버튼묶음 = document.getElementById('기사버튼묶음');
      기사목록.forEach((기사, idx) => {
        const btn = document.createElement('button');
        btn.className = '기사버튼' + (idx === 0 ? ' 선택됨' : '');
        btn.textContent = '👤 ' + 기사;
        btn.onclick = () => {
          document.querySelectorAll('.기사버튼').forEach(b => b.classList.remove('선택됨'));
          btn.classList.add('선택됨');
          기사선택(기사);
        };
        버튼묶음.appendChild(btn);
      });

      // 지도 초기화
      지도객체 = new naver.maps.Map('지도', {
        zoom: 12,
        center: new naver.maps.LatLng(37.5, 127.0)
      });

      // 첫 번째 기사 자동 선택
      if (기사목록.length > 0) 기사선택(기사목록[0]);
    });

  function 기사선택(기사명) {
    const 데이터 = 전체데이터
      .filter(d => d.기사명 === 기사명)
      .sort((a, b) => a.방문순서 - b.방문순서);

    // 카드 업데이트
    document.getElementById('카드방문').textContent = 데이터.length + '건';
    document.getElementById('카드출발').textContent = 데이터[0]?.출발시간 || '-';
    document.getElementById('카드마지막').textContent = 데이터[데이터.length - 1]?.도착시간 || '-';
    document.getElementById('카드날짜').textContent = 데이터[0]?.날짜 || '-';

    // 기존 마커/경로 제거
    현재마커들.forEach(m => m.setMap(null));
    현재마커들 = [];
    if (현재폴리라인) 현재폴리라인.setMap(null);

    // 마커 찍기
    const 좌표들 = [];
    데이터.forEach(d => {
      const pos = new naver.maps.LatLng(d.위도, d.경도);
      좌표들.push(pos);

      const 마커 = new naver.maps.Marker({
        position: pos,
        map: 지도객체,
        icon: {
          content: `<div style="
            background:#1a73e8;
            color:white;
            border-radius:50%;
            width:28px;
            height:28px;
            line-height:28px;
            text-align:center;
            font-weight:bold;
            font-size:13px;
            border:2px solid white;
            box-shadow:0 2px 6px rgba(0,0,0,0.3);
          ">${d.방문순서}</div>`,
          anchor: new naver.maps.Point(14, 14)
        }
      });

      // 마커 클릭시 정보 보여주기
      const 정보창 = new naver.maps.InfoWindow({
        content: `<div style="padding:10px;font-size:13px;font-family:맑은고딕">
          <b>${d.방문순서}번째 방문</b><br>
          📍 ${d.주소}<br>
          🕐 출발 ${d.출발시간} → 도착 ${d.도착시간}
        </div>`
      });

      naver.maps.Event.addListener(마커, 'click', () => {
        정보창.open(지도객체, 마커);
      });

      현재마커들.push(마커);
    });

    // 경로선 그리기
    현재폴리라인 = new naver.maps.Polyline({
      path: 좌표들,
      map: 지도객체,
      strokeColor: '#1a73e8',
      strokeWeight: 3,
      strokeOpacity: 0.7,
      strokeStyle: 'solid'
    });

    // 지도 범위 자동 조정
    if (좌표들.length > 0) {
      const 범위 = new naver.maps.LatLngBounds(좌표들[0], 좌표들[0]);
      좌표들.forEach(p => 범위.extend(p));
      지도객체.fitBounds(범위, { padding: 60 });
    }

    // 표 업데이트
    let html = '';
    데이터.forEach(d => {
      html += `<tr>
        <td><span class="순서뱃지">${d.방문순서}</span></td>
        <td style="text-align:left">${d.주소}</td>
        <td>${d.출발시간}</td>
        <td>${d.도착시간}</td>
      </tr>`;
    });
    document.getElementById('표내용').innerHTML = html;
  }
</script>
</body>
</html>
